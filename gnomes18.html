<!doctype html>
<html id="sadoodle">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width,maximum-scale=1.0,user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #000; }
  </style>
</head>
<body style="text-align:center">

<script>
  // Stub WebFont pour éviter que le jeu reste bloqué si Google Fonts échoue
  window.WebFontConfig = {
    google: { families: ['Noto Sans:400'] },
    active: function() { console.log('WebFont active'); },
    inactive: function() { console.log('WebFont inactive - continuing anyway'); }
  };

  // Si webfont.js ne charge pas, on force l'activation après 2s
  setTimeout(function() {
    if (window.WebFontConfig && window.WebFontConfig.active) {
      try { window.WebFontConfig.active(); } catch(e) {}
    }
  }, 2000);

  if (window.self !== window.top) {
    document.body.parentElement.id = 'sdoodles';
  }
</script>

<!-- WebFont loader en fallback local si possible -->
<script>
  (function() {
    var wf = document.createElement('script');
    wf.src = 'webfont.js'; // fichier local si tu l'as téléchargé
    wf.onerror = function() {
      // Si pas dispo en local, on essaie Google
      var wf2 = document.createElement('script');
      wf2.src = 'https://ajax.googleapis.com/ajax/libs/webfont/1/webfont.js';
      document.head.appendChild(wf2);
    };
    document.head.appendChild(wf);
  })();
</script>

<div id="hplogo" tabindex="0" title="Garden Gnomes" dir="ltr"></div>

<script src="createjs-2015.11.26.min.js"></script>

<script>
(function(){
  window.google = window.google || {};
  google.doodle = google.doodle || {};
  google.doodle.url = "/search?q=garden+gnomes";
  google.doodle.alt = "Garden Gnomes";
  google.doodle.share = "Garden Gnomes";
  google.doodle.shortlink = "//g.co/doodle/permalink";
  google.doodle.gallery = "//www.google.com/doodles/gallery";
  google.doodle.large_image = "logos/2018/gnomes/main-sprite.png";
  google.doodle.hl = "en";
  google.doodle.msgs = { "translations": "Translations" };
  google.doodle.doodle_args = {};

  if (!google.doodle.loaded) {
    google.doodle.loaded = true;
    var e = document.createElement("script");
    e.src = "gnomes18.2.js"; // ← fichier JS dans le même dossier
    e.async = true;
    document.body.appendChild(e);
  }
}).call(this);
</script>

</body>
</html>
